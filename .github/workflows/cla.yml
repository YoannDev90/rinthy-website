# CLA (Contributor License Agreement) GitHub Action
name: CLA Check

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check CLA Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = pr.base.repo.owner.login;
            const repo = pr.base.repo.name;
            const prNumber = pr.number;
            
            // Check if contributor already signed
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            
            const signed = comments.some(c => 
              c.user.type === 'User' && 
              c.body.toLowerCase().includes('I have read the CLA Document and I hereby sign the CLA')
            );
            
            if (!signed) {
              const claMessage = "## Contributor License Agreement (CLA)\n\n" +
                "Thank you for your interest in contributing to **Rinthy**!\n\n" +
                "By signing this CLA, you agree to the following terms:\n\n" +
                "1. **Original Work**: I confirm that my contributions are original work.\n" +
                "2. **Copyright Assignment**: I assign copyright to the project maintainers.\n" +
                "3. **MIT License**: All contributions will be licensed under MIT.\n\n" +
                "**Please comment \"I have read the CLA Document and I hereby sign the CLA\" to sign the CLA.**\n\n" +
                "**CLA Document**: CLA Document is located at: [docs/CLA-Agreement.md](https://github.com/EmanuelPlays/rinthy-website/blob/main/docs/CLA-Agreement.md)\n\n" +
                "*For more info: https://github.com/imsawiq/Rinthy*";

              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: claMessage
              });
              
              core.setFailed('CLA not signed. Please comment "I agree to sign the CLA" to sign the Contributor License Agreement.');
            }
